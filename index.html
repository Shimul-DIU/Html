<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    ul{
      display:flex;
      flex-wrap: wrap;
      justify-content: space-around;
      
    }
  </style>
</head>
<body>
  <label for="search">Search</label>
  <input type="search" name="search" id="search">
  <ul >
    <li>
      <img src="/Images/bg.jpg" alt=""  height="300px"><br>
      <h1>Backgroud img</h1>
    </li>
    <li>
      <img src="/Images/cow.jpg" alt="" height="300px"><br>
      <h1>cow</h1>
    </li>
    <li>
      <img src="/Images/fish.jpg" alt="" height="300px"><br>
      <h1>fish</h1>
    </li>
    <li>
      <img src="/Images/group photp.jpg" alt="" height="300px"><br>
      <h1>Group img</h1>
    </li>
    <li>
      <img src="/Images/laptop.jpg" alt="" height="300px"><br>
      <h1>laptop</h1>
    </li>
    <li>
      <img src="/Images/riyan.jpg" alt="" height="300px"><br>
      <h1>riyan</h1>
    </li>
    <li>
      <img src="/Images/shimul.jpg" alt="" height="300px"><br>
      <h1>shimul</h1>
    </li>
    <li>
      <img src="/Images/somrat.jpg" alt="" height="300px"><br>
      <h1>somrat</h1>
    </li>
   
  </ul>
  
  <div style="position: relative;border:1px solid black;height: 40px;border-radius: 10px;padding: 10px;">
    <div style="position: absolute; top: -10px; left: 10px ;background: white;padding: 0px 5px;;">fast name</div>
    <input style="border: none;border-radius: 30px; outline: none; height: 100%; width: 100%;"  type="text">
  </div>

  <script>
    let items=document.querySelectorAll('ul li');
    let searchbar=document.querySelector('input');
    searchbar.addEventListener('keyup',()=>{
      let searchValue=searchbar.value.toLowerCase();
      items.forEach(item=>{
      let itemLower=item.textContent.toLowerCase();
      if (itemLower.includes(searchValue)){
          item.style.display="block";
      }
      else{
        item.style.display="none"
      }
    })
    })
    
  </script>
  

</body>
</html>
